name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: vpp2txt-linux-amd64
          - goos: linux
            goarch: arm64
            name: vpp2txt-linux-arm64
          - goos: darwin
            goarch: amd64
            name: vpp2txt-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: vpp2txt-darwin-arm64
          - goos: windows
            goarch: amd64
            name: vpp2txt-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w" -o ${{ matrix.name }} ./cmd/vpp2txt/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
